<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 목록</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<h2>👥 등록된 회원 목록</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>계좌번호(UUID)</th>
        <th>잔액</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="member : ${members}">
        <td th:text="${member.id}">1</td>
        <td th:text="${member.name}">홍길동</td>
        <td th:text="${member.account}">UUID-STRING</td>
        <td th:text="${#numbers.formatInteger(member.balance, 3, 'COMMA')} + '원'">100,000원</td>
    </tr>
    </tbody>
</table>
<br>
<a href="/">홈으로 가기</a>
</body>
</html>
